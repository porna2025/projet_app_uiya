<!DOCTYPE html>
<html>
<head>
    <title>Chat Gemini</title>
</head>
<body>
    <h1>Assistant Gemini</h1>
    <form method="post">
        {% csrf_token %}
        <input type="text" name="question" placeholder="Votre question...">
        <button type="submit">Envoyer a gemini</button>
    </form>

    {% if reponse %}
        <div>
            <strong>Réponse :</strong> {{ reponse }}
        </div>
    {% endif %}
</body>
</html>
