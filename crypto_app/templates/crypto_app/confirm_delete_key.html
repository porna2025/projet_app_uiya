{% extends 'crypto_app/base.html' %}

{% block title %}Supprimer la clé - CryptoSafe{% endblock %}

{% block content %}
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card">
        <div class="card-header">
          <h5 class="mb-0">Supprimer la clé</h5>
        </div>
        <div class="card-body">
          <p>Voulez-vous vraiment supprimer la clé <strong>{{ key.name }}</strong> ? Cette action est irréversible.</p>
          <form method="post">
            {% csrf_token %}
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-danger">Oui, supprimer</button>
              <a href="{% url 'manage_keys' %}" class="btn btn-outline-secondary">Annuler</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
